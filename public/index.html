<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.35);
    --accent: #6c8fff;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Figtree',sans-serif; overflow:hidden; }
  body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; opacity:0.6; z-index:0; }
  .blob { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; opacity:0.18; }
  .blob-1 { width:500px;height:500px; background:#3b5bff; top:-150px;left:-100px; animation:drift1 18s ease-in-out infinite; }
  .blob-2 { width:400px;height:400px; background:#a855f7; bottom:-100px;right:-50px; animation:drift2 22s ease-in-out infinite; }
  .blob-3 { width:300px;height:300px; background:#06b6d4; top:40%;left:60%; animation:drift1 15s ease-in-out infinite reverse; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-40px) scale(1.05)} 66%{transform:translate(-20px,20px) scale(0.97)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,-30px) scale(1.08)} }

  .page { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px; }

  .clock-wrap { text-align:center; margin-bottom:10px; animation:fadeUp 0.7s ease both; }
  .clock { font-family:'DM Mono',monospace; font-size:clamp(4.5rem,12vw,8rem); font-weight:300; letter-spacing:-0.04em; color:var(--text); line-height:1; text-shadow:0 0 80px rgba(108,143,255,0.2); }
  .date-display { font-size:0.8rem; font-weight:400; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:10px; }

  .search-wrap { width:100%; max-width:580px; margin-top:40px; animation:fadeUp 0.7s 0.1s ease both; }
  .search-bar { display:flex; align-items:center; background:var(--surface2); border:1.5px solid var(--border); border-radius:50px; padding:6px 6px 6px 22px; gap:10px; backdrop-filter:blur(20px); transition:border-color 0.25s,box-shadow 0.25s,background 0.25s; }
  .search-bar:focus-within { border-color:rgba(108,143,255,0.5); box-shadow:0 0 0 4px rgba(108,143,255,0.1),0 8px 32px rgba(0,0,0,0.3); background:rgba(255,255,255,0.06); }
  .search-icon { color:var(--muted); flex-shrink:0; transition:color 0.2s; }
  .search-bar:focus-within .search-icon { color:var(--accent); }
  .search-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Figtree',sans-serif; font-size:0.95rem; font-weight:400; padding:10px 0; caret-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .go-btn { background:var(--accent); color:#fff; border:none; border-radius:40px; padding:10px 22px; font-family:'Figtree',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s; white-space:nowrap; box-shadow:0 4px 16px rgba(108,143,255,0.3); }
  .go-btn:hover { opacity:0.9; transform:scale(1.03); box-shadow:0 6px 20px rgba(108,143,255,0.45); }
  .go-btn:active { transform:scale(0.97); }

  .shortcuts-wrap { margin-top:40px; width:100%; max-width:580px; animation:fadeUp 0.7s 0.2s ease both; }
  .shortcuts-label { font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:14px; }
  .shortcuts { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
  .shortcut { display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; padding:12px 10px; border-radius:14px; border:1px solid transparent; transition:all 0.2s; min-width:68px; user-select:none; }
  .shortcut:hover { background:var(--surface2); border-color:var(--border); transform:translateY(-3px); }
  .shortcut-icon { width:42px;height:42px; border-radius:12px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; backdrop-filter:blur(10px); transition:border-color 0.2s; }
  .shortcut:hover .shortcut-icon { border-color:rgba(108,143,255,0.3); }
  .shortcut-label { font-size:0.68rem; color:var(--muted); font-weight:500; transition:color 0.2s; }
  .shortcut:hover .shortcut-label { color:var(--text); }

  .offline-bar { display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); backdrop-filter:blur(20px); color:#fca5a5; font-size:0.75rem; font-weight:500; padding:10px 20px; border-radius:50px; letter-spacing:0.04em; z-index:50; animation:slideUp 0.3s ease; }
  .offline-bar.show { display:flex; align-items:center; gap:8px; }
  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  #overlay { display:none; position:fixed; inset:0; z-index:100; background:var(--bg); flex-direction:column; }
  #overlay.open { display:flex; }
  .overlay-bar { display:flex; align-items:center; gap:10px; padding:10px 16px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--border); backdrop-filter:blur(20px); flex-shrink:0; }
  .back-btn { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 14px; font-family:'Figtree',sans-serif; font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
  .back-btn:hover { background:var(--surface); border-color:rgba(255,255,255,0.15); }
  .overlay-url { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-size:0.75rem; font-family:'DM Mono',monospace; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .overlay-newtab { background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:7px 13px; font-size:0.75rem; font-family:'Figtree',sans-serif; font-weight:500; text-decoration:none; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
  .overlay-newtab:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }
  #proxy-iframe { flex:1; border:none; width:100%; }

  #loading-bar { position:fixed; top:0;left:0; height:2px; background:linear-gradient(90deg,var(--accent),#a78bfa); z-index:200; width:0%; transition:width 0.5s ease; border-radius:0 2px 2px 0; }

  .credits { position:fixed; bottom:20px; right:24px; font-size:0.62rem; color:rgba(255,255,255,0.12); letter-spacing:0.06em; z-index:1; animation:fadeUp 1s 0.5s ease both; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div id="loading-bar"></div>

<div class="offline-bar" id="offline-bar">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
  You're offline — cached pages still work
</div>

<div id="overlay">
  <div class="overlay-bar">
    <button class="back-btn" onclick="closeProxy()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Home
    </button>
    <div class="overlay-url" id="overlay-url"></div>
    <a class="overlay-newtab" id="overlay-newtab" href="#" target="_blank">↗ New Tab</a>
  </div>
  <iframe id="proxy-iframe" src=""></iframe>
</div>

<div class="page">
  <div class="clock-wrap">
    <div class="clock" id="clock">00:00</div>
    <div class="date-display" id="date-display"></div>
  </div>

  <div class="search-wrap">
    <div class="search-bar" id="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="url-input" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false"/>
      <button class="go-btn" onclick="go()">Go</button>
    </div>
  </div>

  <div class="shortcuts-wrap">
    <div class="shortcuts-label">Quick Access</div>
    <div class="shortcuts">
      <div class="shortcut" onclick="proxyTo('https://google.com')"><div class="shortcut-icon">🔍</div><span class="shortcut-label">Google</span></div>
      <div class="shortcut" onclick="proxyTo('https://youtube.com')"><div class="shortcut-icon">▶️</div><span class="shortcut-label">YouTube</span></div>
      <div class="shortcut" onclick="proxyTo('https://reddit.com')"><div class="shortcut-icon">🟠</div><span class="shortcut-label">Reddit</span></div>
      <div class="shortcut" onclick="proxyTo('https://twitter.com')"><div class="shortcut-icon">🐦</div><span class="shortcut-label">Twitter</span></div>
      <div class="shortcut" onclick="proxyTo('https://discord.com')"><div class="shortcut-icon">💬</div><span class="shortcut-label">Discord</span></div>
      <div class="shortcut" onclick="proxyTo('https://github.com')"><div class="shortcut-icon">⚙️</div><span class="shortcut-label">GitHub</span></div>
      <div class="shortcut" onclick="proxyTo('https://twitch.tv')"><div class="shortcut-icon">🎮</div><span class="shortcut-label">Twitch</span></div>
      <div class="shortcut" onclick="proxyTo('https://wikipedia.org')"><div class="shortcut-icon">📖</div><span class="shortcut-label">Wikipedia</span></div>
    </div>
  </div>
</div>

<div class="credits">ProxyVault</div>

<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date-display').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  }
  updateClock();
  setInterval(updateClock, 1000);

  function encodeTarget(url) { return btoa(url).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }

  function normalize(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (!raw.includes('.') || raw.includes(' ')) return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
    if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
    return raw;
  }

  function openProxy(target) {
    const path = '/proxy/' + encodeTarget(target);
    document.getElementById('overlay-url').textContent = target;
    document.getElementById('overlay-newtab').href = path;
    document.getElementById('proxy-iframe').src = path;
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    animateBar();
  }

  function closeProxy() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('proxy-iframe').src = '';
    document.body.style.overflow = '';
  }

  function go() {
    const target = normalize(document.getElementById('url-input').value);
    if (!target) { shake(); return; }
    openProxy(target);
  }

  function proxyTo(url) {
    document.getElementById('url-input').value = url;
    openProxy(url);
  }

  function animateBar() {
    const bar = document.getElementById('loading-bar');
    bar.style.transition = 'width 0.8s ease';
    bar.style.width = '75%';
    setTimeout(() => { bar.style.width = '100%'; }, 800);
    setTimeout(() => { bar.style.transition = 'none'; bar.style.width = '0%'; }, 1400);
  }

  function shake() {
    const bar = document.getElementById('search-bar');
    bar.style.animation = 'shake 0.4s ease';
    setTimeout(() => bar.style.animation = '', 400);
  }

  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProxy(); });

  window.addEventListener('online', () => document.getElementById('offline-bar').classList.remove('show'));
  window.addEventListener('offline', () => document.getElementById('offline-bar').classList.add('show'));
  if (!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
